services:
  - type: web
    name: baupass-backend
    env: python
    plan: free
    disks:
      - name: baupass-data
        mountPath: /var/data
        sizeGB: 1
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/run_prod.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PUBLIC_BASE_URL
        value: https://baupass-backend.onrender.com
      - key: BAUPASS_DB_PATH
        value: /var/data/baupass.db
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d95d39" />
  <title>BauPass App installieren</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 20% 10%, #fff5ec, #f3efe7 55%, #efe7db 100%);
      color: #1f1f1f;
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      padding: 24px;
      display: grid;
      gap: 14px;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    button, a {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    #openAppBtn {
      background: linear-gradient(135deg, #d95d39, #b94a2a);
      color: #fff;
    }
    #installBtn {
      background: #f6efe2;
      color: #3e2f26;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }
    .hint {
      font-size: 0.9rem;
      color: #5f5f5f;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mitarbeiter-App installieren</h1>
    <p>Installiere die BauPass App auf deinem Handy. Danach siehst du deinen digitalen Ausweis jederzeit direkt in der App.</p>
    <div class="actions">
      <button id="openAppBtn" type="button">Ausweis in App oeffnen</button>
      <button id="installBtn" type="button">App installieren</button>
    </div>
    <p id="hint" class="hint">Falls kein Installationsfenster erscheint: Browser-Menue oeffnen und "Zum Startbildschirm" bzw. "App installieren" waehlen.</p>
  </main>

  <script>
    const params = new URL(window.location.href).searchParams;
    const accessToken = params.get("access") || "";
    if (accessToken) {
      try {
        localStorage.setItem("baupass-worker-access-token", accessToken);
      } catch {
        // ignore storage failures
      }
    }
    const targetUrl = `./worker.html${accessToken ? `?access=${encodeURIComponent(accessToken)}` : ""}`;

    let deferredInstallPrompt = null;
    const installBtn = document.querySelector("#installBtn");
    const openAppBtn = document.querySelector("#openAppBtn");
    const hint = document.querySelector("#hint");

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      hint.textContent = "Tippe auf 'App installieren', dann auf 'Ausweis in App oeffnen'.";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        hint.textContent = "Kein automatischer Prompt verfuegbar. Bitte Browser-Menue nutzen: 'Zum Startbildschirm' / 'App installieren'.";
        return;
      }
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
    });

    openAppBtn.addEventListener("click", () => {
      window.location.href = targetUrl;
    });
  </script>
</body>
</html>
